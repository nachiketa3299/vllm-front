<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGarment 생성 도구</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>ChatGarment JSON 생성기</h1>
        <p>
          의류 이미지 1장을 올리고, 생성된 JSON을 미리 본 뒤
          <code>struct.json</code>과 <code>floats.json</code>이 들어있는 ZIP을 다운로드합니다.
        </p>
      </section>

      <div class="layout">
        <section class="panel controls">
          <input id="file-input" type="file" accept="image/*" />
          <div id="dropzone" class="dropzone" role="button" tabindex="0" aria-label="이미지 업로드">
            <div class="placeholder">
              <strong>이미지를 여기로 드래그하세요</strong>
              <span>또는 클릭해서 파일 탐색기를 여세요</span>
            </div>
            <img id="preview-image" alt="선택한 의류 이미지 미리보기" />
          </div>

          <div class="actions">
            <button id="browse-button" class="secondary" type="button">Upload Image</button>
            <button id="generate-button" class="primary" type="button" disabled>Generate</button>
            <button id="download-button" class="download" type="button" disabled>Download ZIP</button>
          </div>

          <div id="status" class="status"></div>
          <article class="log-card">
            <header>로그</header>
            <pre id="log-output" class="log-output">대기 중입니다.</pre>
          </article>
        </section>

        <section class="panel preview">
          <div class="preview-grid">
            <article class="preview-card">
              <header>struct.json</header>
              <pre id="struct-preview">{}</pre>
            </article>
            <article class="preview-card">
              <header>floats.json</header>
              <pre id="floats-preview">{}</pre>
            </article>
          </div>
        </section>
      </div>
    </main>

    <script src="/static/app.js"></script>
  </body>
  </html>
